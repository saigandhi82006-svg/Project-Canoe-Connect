<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canoe & Cuisine - My Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#D32F2F',
                            yellow: '#FFC107',
                            cream: '#FFF8E1',
                        }
                    },
                    fontFamily: {
                        logo: ['Pacifico', 'cursive'],
                        body: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8f9fa; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #FFC107; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D32F2F; }
    </style>
</head>
<body class="font-body min-h-screen">

    <div class="max-w-4xl mx-auto">
        <!-- HEADER -->
        <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
            <div class="px-6 py-6 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="home.html" class="flex items-center gap-2 text-gray-600 hover:text-brand-red transition">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        <span class="font-semibold">Back to Menu</span>
                    </a>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">My Orders</h1>
                <div class="w-24"></div>
            </div>
        </header>

        <!-- ORDERS CONTAINER -->
        <main class="p-6">
            <div id="orders-container" class="space-y-4">
                <!-- Orders will be loaded here -->
            </div>

            <div id="no-orders-message" class="hidden">
                <div class="text-center py-16">
                    <div class="text-6xl mb-4">📭</div>
                    <p class="text-xl text-gray-600 mb-6">No orders yet</p>
                    <p class="text-gray-500 mb-8">Start adding items to your cart and place an order!</p>
                    <a href="home.html" class="inline-block bg-brand-red text-white font-bold py-3 px-6 rounded-xl hover:bg-red-700 transition">
                        Browse Menu
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const DB_KEY = 'canoe_cuisine_db';
        const ORDERS_KEY = 'canoe_cuisine_orders';
        
        let foodDatabase = [];
        let orders = [];

        // Initial Seed Data
        const initialData = [
            { id: 1, name: "Chicken Dum Biryani", category: "biryani", price: 250, image: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&auto=format&fit=crop&q=60", available: true, active: true },
            { id: 2, name: "Paneer Biryani", category: "biryani", price: 200, image: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=500&auto=format&fit=crop&q=60", available: true, active: true },
            { id: 3, name: "Pesarattu", category: "breakfast", price: 60, image: "https://images.unsplash.com/photo-1668236543090-d2f89695029c?w=500&auto=format&fit=crop&q=60", available: true, active: true },
            { id: 4, name: "Idli with Karam Podi", category: "breakfast", price: 40, image: "https://images.unsplash.com/photo-1589301760576-41f4739112d1?w=500&auto=format&fit=crop&q=60", available: true, active: true },
            { id: 5, name: "Punugulu", category: "snack", price: 50, image: "https://media.istockphoto.com/id/1329241908/photo-punugulu-a-famous-andhra-snack.jpg?s=612x612&w=0&k=20&c=p-bZ2sY1KmjK_u5v3t6rK_fXy7lZ_m8q9r9_sT6y5_w=", available: true, active: true },
            { id: 6, name: "Mirchi Bajji", category: "snack", price: 40, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Mirchi_Bajji.jpg/640px-Mirchi_Bajji.jpg", available: true, active: true },
            { id: 7, name: "Gongura Chicken", category: "biryani", price: 280, image: "https://images.unsplash.com/photo-1610057099443-fde8c4d50f91?w=500&auto=format&fit=crop&q=60", available: true, active: true },
            { id: 8, name: "Mysore Bonda", category: "snack", price: 45, image: "https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&auto=format&fit=crop&q=60", available: true, active: true }
        ];

        function loadData() {
            const stored = localStorage.getItem(DB_KEY);
            if (stored) {
                foodDatabase = JSON.parse(stored);
            } else {
                foodDatabase = JSON.parse(JSON.stringify(initialData));
                localStorage.setItem(DB_KEY, JSON.stringify(foodDatabase));
            }
        }

        function loadOrders() {
            orders = JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orders-container');
            const noMsg = document.getElementById('no-orders-message');

            if (orders.length === 0) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
                return;
            }

            noMsg.classList.add('hidden');
            container.innerHTML = '';

            // Sort orders by most recent first
            const sortedOrders = [...orders].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            sortedOrders.forEach((order) => {
                const isAccepted = order.accepted;
                const statusColor = isAccepted ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200';
                const statusText = isAccepted ? '✓ Accepted' : '⏳ Pending';
                const borderColor = isAccepted ? 'border-green-500' : 'border-yellow-500';

                const div = document.createElement('div');
                div.className = `border-l-4 ${borderColor} bg-white rounded-lg p-6 shadow-sm hover:shadow-md transition-all`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-bold text-gray-800 text-lg">${order.orderId}</p>
                            <p class="text-sm text-gray-500 mt-1">${order.timestamp}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-sm font-bold ${statusColor} border">
                            ${statusText}
                        </span>
                    </div>
                    
                    <div class="bg-gray-50 rounded-lg p-4 mb-4 max-h-64 overflow-y-auto">
                        <div class="text-xs font-bold text-gray-600 mb-3 uppercase tracking-wide">Ordered Items:</div>
                        ${(() => {
                            let itemsList = [];
                            try {
                                if (Array.isArray(order.items) && order.items.length > 0) {
                                    if (order.items[0] && order.items[0].name) {
                                        itemsList = order.items;
                                    } else {
                                        itemsList = order.items.map(id => {
                                            const found = foodDatabase.find(f => f.id == id);
                                            return found ? { name: found.name, price: found.price, image: found.image } : { name: 'Unknown Item', price: 0 };
                                        });
                                    }
                                }
                            } catch (e) { 
                                itemsList = []; 
                            }
                            
                            if (itemsList.length === 0) {
                                return '<div class="text-sm text-gray-500 italic py-2">No items in this order.</div>';
                            }
                            
                            return itemsList.map(item => `
                                <div class="flex items-center justify-between py-2.5 border-b border-gray-200 last:border-0 hover:bg-gray-100 rounded px-2 transition">
                                    <div class="flex items-center gap-3 flex-1">
                                        ${item.image ? `<img src="${item.image}" class="w-10 h-10 rounded-lg object-cover border border-gray-200" onerror="this.style.display='none'">` : ''}
                                        <span class="text-gray-800 font-semibold">${item.name}</span>
                                    </div>
                                    <span class="font-bold text-brand-red">₹${item.price}</span>
                                </div>
                            `).join('');
                        })()}
                    </div>

                    ${order.booking ? `
                        <div class="mb-4 p-4 bg-blue-50 rounded-lg border border-blue-200">
                            <div class="flex items-center gap-2 mb-2">
                                <i data-lucide="calendar-check" class="w-4 h-4 text-blue-700"></i>
                                <span class="font-bold text-blue-800">Booking Details</span>
                            </div>
                            <div class="text-sm text-blue-700">
                                <div><strong>People:</strong> ${order.booking.people} person${order.booking.people > 1 ? 's' : ''}</div>
                                <div><strong>Time:</strong> ${order.booking.time}</div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="flex justify-between items-center pt-4 border-t border-gray-100">
                        <div class="text-lg font-bold">
                            Total: <span class="text-brand-red text-xl">₹${order.total}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="credit-card" class="w-4 h-4 text-gray-500"></i>
                            <span class="text-sm font-semibold text-gray-600">${order.paymentMethod ? order.paymentMethod.toUpperCase() : 'CASH'}</span>
                        </div>
                    </div>

                    ${isAccepted ? `
                        <div class="mt-4 p-3 bg-green-50 rounded-lg text-sm text-green-700 font-semibold text-center border border-green-200 animate-pulse">
                            🎉 Your order has been accepted by admin!
                        </div>
                    ` : `
                        <div class="mt-4 p-3 bg-yellow-50 rounded-lg text-sm text-yellow-700 font-semibold text-center border border-yellow-200">
                            ⏳ Waiting for admin to accept your order...
                        </div>
                    `}
                `;
                container.appendChild(div);
            });

            lucide.createIcons();
        }

        // Listen for real-time updates from other tabs
        window.addEventListener('storage', function(event) {
            if (event.key === ORDERS_KEY) {
                loadOrders();
            }
        });

        // Initialize
        function init() {
            loadData();
            loadOrders();
            lucide.createIcons();
        }

        // Run on page load
        window.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
