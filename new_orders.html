<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - New Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .bg-brand-red { background-color: #D32F2F; }
        .bg-brand-cream { background-color: #FFFBF2; }
        .bg-brand-yellow { background-color: #FFC107; }
        .text-brand-yellow { color: #FFC107; }
    </style>
</head>
<body class="bg-brand-cream h-screen flex overflow-hidden">

    <!-- SIDEBAR (Matches Screenshot) -->
    <aside class="w-64 bg-brand-red text-white flex flex-col justify-between flex-shrink-0 transition-all duration-300">
        <div>
            <!-- Logo Section -->
            <div class="p-6">
                <div class="flex items-center gap-2 mb-1">
                    <i class="fa-solid fa-utensils text-sm"></i>
                    <span class="text-xs font-semibold tracking-wider opacity-80">ADMIN PANEL</span>
                </div>
                <h1 class="text-2xl font-bold italic font-serif">
                    Canoe <span class="text-brand-yellow">&</span> Cuisine
                </h1>
            </div>

            <!-- Navigation Links -->
            <nav class="mt-4 px-3 space-y-2">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-white/90 hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fa-regular fa-square-plus w-5"></i>
                    <span class="font-medium">Add Items</span>
                </a>
                
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-white/90 hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fa-solid fa-trash-can w-5"></i>
                    <span class="font-medium">Remove Items</span>
                </a>

                <a href="#" class="flex items-center gap-3 px-4 py-3 text-white/90 hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fa-solid fa-indian-rupee-sign w-5"></i>
                    <span class="font-medium">Price Changing</span>
                </a>

                <a href="#" class="flex items-center gap-3 px-4 py-3 text-white/90 hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fa-regular fa-eye w-5"></i>
                    <span class="font-medium">Availability</span>
                </a>

                <!-- Active Tab: New Orders -->
                <div class="mt-6">
                    <a href="#" class="flex items-center justify-between gap-3 px-4 py-3 bg-brand-yellow text-red-900 rounded-lg font-bold shadow-md">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-cube w-5"></i>
                            <span>New Orders</span>
                        </div>
                        <span class="bg-red-600 text-white text-xs py-0.5 px-2 rounded-full">4</span>
                    </a>
                    <p class="text-xs text-white/60 text-center mt-2 cursor-pointer hover:text-white">Reset System Data</p>
                </div>
            </nav>
        </div>

        <!-- User Profile (Bottom) -->
        <div class="p-4 bg-red-800/30 m-3 rounded-xl border border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brand-yellow flex items-center justify-center text-red-800 font-bold text-lg">
                    A
                </div>
                <div>
                    <p class="font-bold text-sm">Admin User</p>
                    <p class="text-xs text-white/70">Mess Manager</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto p-8 relative">
        
        <!-- Header -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">New Orders</h2>
                <p class="text-gray-500 mt-1">View and manage incoming customer orders.</p>
            </div>
            <div class="flex gap-3">
                <button class="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 shadow-sm">
                    <i class="fa-solid fa-filter mr-2"></i>Filter
                </button>
                <button class="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 shadow-sm">
                    <i class="fa-solid fa-arrow-rotate-right mr-2"></i>Refresh
                </button>
            </div>
        </div>

        <!-- Orders Grid (populated dynamically from localStorage) -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="ordersGrid"></div>

        <!-- Empty State (Hidden by default) -->
        <div id="emptyState" class="hidden flex-col items-center justify-center h-[60vh] text-center">
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                <i class="fa-solid fa-check text-3xl text-gray-400"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800">All caught up!</h3>
            <p class="text-gray-500 mt-2">No new orders at the moment.</p>
        </div>

    </main>

    <script>
        const ORDERS_KEY = 'canoe_cuisine_orders';
        const ordersChannel = new BroadcastChannel('cc_orders');

        function loadOrdersFromStorage() {
            try {
                return JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
            } catch (e) {
                return [];
            }
        }

        function saveOrdersToStorage(orders) {
            localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
            // notify other tabs
            try { ordersChannel.postMessage({ type: 'orders_updated', orders }); } catch (e) {}
            window.dispatchEvent(new Event('ordersChanged'));
        }

        function groupItems(items) {
            const map = new Map();
            (items || []).forEach(it => {
                const key = it.name || it.id || JSON.stringify(it);
                const existing = map.get(key);
                if (existing) {
                    existing.qty += 1;
                    existing.subtotal += (it.price || 0);
                } else {
                    map.set(key, { name: it.name || 'Item', price: it.price || 0, image: it.image || '', qty: 1, subtotal: it.price || 0 });
                }
            });
            return Array.from(map.values());
        }

        function renderOrders() {
            const ordersGrid = document.getElementById('ordersGrid');
            const emptyState = document.getElementById('emptyState');
            const allOrders = loadOrdersFromStorage();
            // Show only pending/unaccepted orders
            const pending = allOrders.filter(o => !o.accepted && o.status !== 'rejected');

            ordersGrid.innerHTML = '';

            if (!pending || pending.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                updateSidebarBadge(0);
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            pending.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

            pending.forEach(order => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow relative overflow-hidden';
                const header = document.createElement('div');
                header.className = 'absolute top-0 left-0 w-1 h-full ' + (order.accepted ? 'bg-gray-400' : 'bg-green-500');
                card.appendChild(header);

                const top = document.createElement('div');
                top.className = 'flex justify-between items-start mb-4';
                top.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-lg text-gray-800">${order.orderId}</h3>
                            <span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wide">${order.paymentMethod ? order.paymentMethod.toUpperCase() : 'PAID'}</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-1"><i class="fa-regular fa-clock mr-1"></i> ${order.timestamp}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-xl text-gray-900">₹${order.total || 0}</p>
                        <p class="text-xs text-gray-500">${(order.paymentMethod || '').toUpperCase()}</p>
                    </div>
                `;
                card.appendChild(top);

                // Customer info (if available)
                const cust = document.createElement('div');
                cust.className = 'flex items-center gap-2 mb-4 bg-gray-50 p-2 rounded-lg';
                const initials = order.customerInitials || (order.orderId || '').slice(-2);
                const customerName = order.customerName || 'Customer';
                cust.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-bold text-gray-600">${initials}</div>
                    <div>
                        <p class="text-xs font-bold text-gray-700">${customerName}</p>
                        <p class="text-[10px] text-gray-500">${order.customerId ? 'ID: ' + order.customerId : ''}</p>
                    </div>
                `;
                card.appendChild(cust);

                // Items list (grouped)
                const itemsContainer = document.createElement('div');
                itemsContainer.className = 'border-t border-dashed border-gray-200 pt-3 mb-4 space-y-2';
                const grouped = groupItems(order.items || []);
                if (grouped.length === 0) {
                    itemsContainer.innerHTML = '<div class="text-xs text-gray-500 italic py-2">No items in this order.</div>';
                } else {
                    grouped.forEach(g => {
                        const row = document.createElement('div');
                        row.className = 'flex justify-between text-sm';
                        row.innerHTML = `<span class="text-gray-600"><span class="font-bold text-gray-900">${g.qty}x</span> ${g.name}</span><span class="text-gray-400">₹${g.subtotal}</span>`;
                        itemsContainer.appendChild(row);
                    });
                }
                card.appendChild(itemsContainer);

                // Actions
                const actions = document.createElement('div');
                actions.className = 'grid grid-cols-2 gap-3 mt-4';

                const rejectBtn = document.createElement('button');
                rejectBtn.className = 'w-full py-2.5 rounded-lg border border-red-200 text-red-600 font-medium text-sm hover:bg-red-50 transition-colors';
                rejectBtn.textContent = 'Reject';
                rejectBtn.onclick = () => rejectOrderById(order.orderId);

                const acceptBtn = document.createElement('button');
                acceptBtn.className = 'w-full py-2.5 rounded-lg bg-green-600 text-white font-medium text-sm hover:bg-green-700 shadow-sm transition-colors flex justify-center items-center gap-2';
                acceptBtn.innerHTML = 'Accept <i class="fa-solid fa-check"></i>';
                acceptBtn.onclick = () => acceptOrderById(order.orderId, acceptBtn);

                actions.appendChild(rejectBtn);
                actions.appendChild(acceptBtn);
                card.appendChild(actions);

                ordersGrid.appendChild(card);
            });

            updateSidebarBadge(pending.length);
        }

        function acceptOrderById(orderId, btn) {
            const orders = loadOrdersFromStorage();
            const idx = orders.findIndex(o => o.orderId === orderId);
            if (idx === -1) return;
            orders[idx].accepted = true;
            orders[idx].status = 'accepted';
            saveOrdersToStorage(orders);

            // simple visual feedback
            if (btn) {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Accepted';
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-gray-400','cursor-not-allowed');
                btn.disabled = true;
            }

            // re-render
            setTimeout(renderOrders, 400);
        }

        function rejectOrderById(orderId) {
            let orders = loadOrdersFromStorage();
            orders = orders.filter(o => o.orderId !== orderId);
            saveOrdersToStorage(orders);
            renderOrders();
        }

        function updateSidebarBadge(count) {
            const badge = document.querySelector('aside span.bg-red-600');
            if (badge) badge.innerText = String(count);
        }

        // Listen to storage changes (other tabs)
        window.addEventListener('storage', function(event) {
            if (event.key === ORDERS_KEY) {
                renderOrders();
            }
        });

        // Also listen to broadcasts
        ordersChannel.onmessage = (ev) => {
            if (ev.data && ev.data.type === 'orders_updated') renderOrders();
        };

        // Initial render
        renderOrders();
    </script>
</body>
</html>
